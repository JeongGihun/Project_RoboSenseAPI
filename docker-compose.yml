#      - postgres-data-replica:/var/lib/postgresql/data
#      - ./postgres/replica/postgresql.conf:/etc/postgresql/postgresql.conf
#      - ./postgres/replica/init-replica.sh:/etc/postgresql/init-replica.sh
#    depends_on:
#      postgres:
#        condition: service_healthy
#    networks:
#      - robosense-network
#    healthcheck:
#      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
#      interval: 10s
#      timeout: 5s
#      retries: 5

  # Redis 캐시
  redis:
    image : redis:7
    container_name : robosense-redis
    ports:
      - "6379:6379"
    networks:
      - robosense-network
    healthcheck:
      test : ["CMD", "redis-cli", "ping"]
      interval : 10s
      timeout : 5s
      retries : 5

  # FastAPI 인스턴스 1
  fastapi-1:
    build : .
    container_name: fastapi-1
    cap_add :
      - SYS_PTRACE
    security_opt :
      - seccomp:unconfined
    environment:
      POSTGRES_HOST : ${POSTGRES_HOST}
      POSTGRES_PORT : ${POSTGRES_PORT}
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
#      POSTGRES_REPLICA_HOST: ${POSTGRES_REPLICA_HOST}
#      POSTGRES_REPLICA_PORT: ${POSTGRES_REPLICA_PORT}
#      POSTGRES_REPLICA_USER: ${POSTGRES_REPLICA_USER}
#      POSTGRES_REPLICA_PASSWORD: ${POSTGRES_REPLICA_PASSWORD}
#      POSTGRES_REPLICA_DB: ${POSTGRES_REPLICA_DB}
      REDIS_HOST : ${REDIS_HOST}
      REDIS_PORT : ${REDIS_PORT}
      ENABLE_PROFILING : "false"  # cProfile 미사용 / 사용
    volumes :
      - ./profiles:/app/profiles
    depends_on:
      postgres :
        condition : service_healthy
#      postgres-replica:
#        condition: service_healthy
      redis :
        condition : service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # FastAPI 인스턴스 2
  fastapi-2:
    build: .
    container_name: fastapi-2
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
#      POSTGRES_REPLICA_HOST: ${POSTGRES_REPLICA_HOST}
#      POSTGRES_REPLICA_PORT: ${POSTGRES_REPLICA_PORT}
#      POSTGRES_REPLICA_USER: ${POSTGRES_REPLICA_USER}
#      POSTGRES_REPLICA_PASSWORD: ${POSTGRES_REPLICA_PASSWORD}
#      POSTGRES_REPLICA_DB: ${POSTGRES_REPLICA_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
#      postgres-replica:
#        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # FastAPI 인스턴스 3
  fastapi-3:
    build: .
    container_name: fastapi-3
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
#      POSTGRES_REPLICA_HOST: ${POSTGRES_REPLICA_HOST}
#      POSTGRES_REPLICA_PORT: ${POSTGRES_REPLICA_PORT}
#      POSTGRES_REPLICA_USER: ${POSTGRES_REPLICA_USER}
#      POSTGRES_REPLICA_PASSWORD: ${POSTGRES_REPLICA_PASSWORD}
#      POSTGRES_REPLICA_DB: ${POSTGRES_REPLICA_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
#      postgres-replica:
#        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # FastAPI 인스턴스 4
  fastapi-4:
    build: .
    container_name: fastapi-4
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
#      POSTGRES_REPLICA_HOST: ${POSTGRES_REPLICA_HOST}
#      POSTGRES_REPLICA_PORT: ${POSTGRES_REPLICA_PORT}
#      POSTGRES_REPLICA_USER: ${POSTGRES_REPLICA_USER}
#      POSTGRES_REPLICA_PASSWORD: ${POSTGRES_REPLICA_PASSWORD}
#      POSTGRES_REPLICA_DB: ${POSTGRES_REPLICA_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
#      postgres-replica:
#        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # FastAPI 인스턴스 5
  fastapi-5:
    build: .
    container_name: fastapi-5
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
#      POSTGRES_REPLICA_HOST: ${POSTGRES_REPLICA_HOST}
#      POSTGRES_REPLICA_PORT: ${POSTGRES_REPLICA_PORT}
#      POSTGRES_REPLICA_USER: ${POSTGRES_REPLICA_USER}
#      POSTGRES_REPLICA_PASSWORD: ${POSTGRES_REPLICA_PASSWORD}
#      POSTGRES_REPLICA_DB: ${POSTGRES_REPLICA_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
#      postgres-replica:
#        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # Nginx 로드 밸런서
  nginx :
    image : nginx:latest
    container_name : robosense-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi-1
      - fastapi-2
      - fastapi-3
      - fastapi-4
      - fastapi-5
    networks :
      - robosense-network

# 볼륨 정의 (데이터 영속성)
volumes :
  postgres-data:
  #postgres-data-replica:

# 네트워크
networks:
  robosense-network:
    driver: bridge