services :
  # PostgreSQL DB
  postgres :
    image : postgres:16
    container_name: robosense-postgres
    command : postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
    ports :
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - robosense-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval : 10s
      timeout : 5s
      retries : 5

  # Redis 캐시
  redis:
    image : redis:7
    container_name : robosense-redis
    ports:
      - "6379:6379"
    networks:
      - robosense-network
    healthcheck:
      test : ["CMD", "redis-cli", "ping"]
      interval : 10s
      timeout : 5s
      retries : 5

  # FastAPI 인스턴스 1
  fastapi-1:
    build : .
    container_name: fastapi-1
    cap_add :
      - SYS_PTRACE
    security_opt :
      - seccomp:unconfined
    environment:
      POSTGRES_HOST : ${POSTGRES_HOST}
      POSTGRES_PORT : ${POSTGRES_PORT}
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
      REDIS_HOST : ${REDIS_HOST}
      REDIS_PORT : ${REDIS_PORT}
      ALLOWED_ORIGINS : ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      ENABLE_PROFILING : "false"  # cProfile 미사용 / 사용
    volumes :
      - ./profiles:/app/profiles
    depends_on:
      postgres :
        condition : service_healthy
      redis :
        condition : service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # FastAPI 인스턴스 2
  fastapi-2:
    build: .
    container_name: fastapi-2
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # FastAPI 인스턴스 3
  fastapi-3:
    build: .
    container_name: fastapi-3
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # FastAPI 인스턴스 4
  fastapi-4:
    build: .
    container_name: fastapi-4
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # FastAPI 인스턴스 5
  fastapi-5:
    build: .
    container_name: fastapi-5
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - robosense-network

  # Nginx 로드 밸런서
  nginx :
    image : nginx:latest
    container_name : robosense-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi-1
      - fastapi-2
      - fastapi-3
      - fastapi-4
      - fastapi-5
    networks :
      - robosense-network

# 볼륨 정의 (데이터 영속성)
volumes :
  postgres-data:

# 네트워크
networks:
  robosense-network:
    driver: bridge