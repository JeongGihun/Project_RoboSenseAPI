[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["test"]
addopts = "--ignore=test/test_single_request.py --ignore=test/puttest.py --ignore=test/locustfile.py"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
per-file-ignores = {"test/conftest.py" = ["E402", "F401"]}

[tool.coverage.run]
omit = ["app/utils/retry.py", "app/redis_client.py"]
