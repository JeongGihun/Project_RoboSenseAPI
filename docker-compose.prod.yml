services :
  postgres :
    image : postgres:16
    container_name: robosense-postgres
    command : postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
    expose :
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - robosense-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval : 10s
      timeout : 5s
      retries : 5

  redis:
    image : redis:7
    container_name : robosense-redis
    expose:
      - "6379"
    networks:
      - robosense-network
    healthcheck:
      test : ["CMD", "redis-cli", "ping"]
      interval : 10s
      timeout : 5s
      retries : 5

  fastapi-1:
    image: ghcr.io/jeonggihun/robosense-api:latest
    container_name: fastapi-1
    environment:
      POSTGRES_HOST : ${POSTGRES_HOST}
      POSTGRES_PORT : ${POSTGRES_PORT}
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
      REDIS_HOST : ${REDIS_HOST}
      REDIS_PORT : ${REDIS_PORT}
      ADMIN_KEY : ${ADMIN_KEY}
      ALLOWED_ORIGINS : ${ALLOWED_ORIGINS}
    depends_on:
      postgres :
        condition : service_healthy
      redis :
        condition : service_healthy
    restart: on-failure
    networks:
      - robosense-network

  fastapi-2:
    image: ghcr.io/jeonggihun/robosense-api:latest
    container_name: fastapi-2
    environment:
      POSTGRES_HOST : ${POSTGRES_HOST}
      POSTGRES_PORT : ${POSTGRES_PORT}
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
      REDIS_HOST : ${REDIS_HOST}
      REDIS_PORT : ${REDIS_PORT}
      ADMIN_KEY : ${ADMIN_KEY}
      ALLOWED_ORIGINS : ${ALLOWED_ORIGINS}
    depends_on:
      postgres :
        condition : service_healthy
      redis :
        condition : service_healthy
    restart: on-failure
    networks:
      - robosense-network

  fastapi-3:
    image: ghcr.io/jeonggihun/robosense-api:latest
    container_name: fastapi-3
    environment:
      POSTGRES_HOST : ${POSTGRES_HOST}
      POSTGRES_PORT : ${POSTGRES_PORT}
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
      REDIS_HOST : ${REDIS_HOST}
      REDIS_PORT : ${REDIS_PORT}
      ADMIN_KEY : ${ADMIN_KEY}
      ALLOWED_ORIGINS : ${ALLOWED_ORIGINS}
    depends_on:
      postgres :
        condition : service_healthy
      redis :
        condition : service_healthy
    restart: on-failure
    networks:
      - robosense-network

  fastapi-4:
    image: ghcr.io/jeonggihun/robosense-api:latest
    container_name: fastapi-4
    environment:
      POSTGRES_HOST : ${POSTGRES_HOST}
      POSTGRES_PORT : ${POSTGRES_PORT}
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
      REDIS_HOST : ${REDIS_HOST}
      REDIS_PORT : ${REDIS_PORT}
      ADMIN_KEY : ${ADMIN_KEY}
      ALLOWED_ORIGINS : ${ALLOWED_ORIGINS}
    depends_on:
      postgres :
        condition : service_healthy
      redis :
        condition : service_healthy
    restart: on-failure
    networks:
      - robosense-network

  fastapi-5:
    image: ghcr.io/jeonggihun/robosense-api:latest
    container_name: fastapi-5
    environment:
      POSTGRES_HOST : ${POSTGRES_HOST}
      POSTGRES_PORT : ${POSTGRES_PORT}
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
      REDIS_HOST : ${REDIS_HOST}
      REDIS_PORT : ${REDIS_PORT}
      ADMIN_KEY : ${ADMIN_KEY}
      ALLOWED_ORIGINS : ${ALLOWED_ORIGINS}
    depends_on:
      postgres :
        condition : service_healthy
      redis :
        condition : service_healthy
    restart: on-failure
    networks:
      - robosense-network

  nginx :
    image : nginx:latest
    container_name : robosense-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi-1
      - fastapi-2
      - fastapi-3
      - fastapi-4
      - fastapi-5
    networks :
      - robosense-network

volumes :
  postgres-data:

networks:
  robosense-network:
    driver: bridge
