<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="nginxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="fastapiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="pgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="redisGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="cppGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">RoboSense API — System Architecture</text>
  <line x1="300" y1="52" x2="600" y2="52" stroke="#475569" stroke-width="1"/>

  <!-- Docker boundary -->
  <rect x="60" y="130" width="780" height="470" rx="16" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="80" y="155" fill="#94a3b8" font-size="12" font-weight="600">Docker Compose</text>

  <!-- ============ CLIENT ============ -->
  <rect x="330" y="68" width="240" height="46" rx="10" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <text x="450" y="96" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Client / Locust / Landing Page</text>

  <!-- Arrow: Client → Nginx -->
  <line x1="450" y1="114" x2="450" y2="168" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="462" y="145" fill="#94a3b8" font-size="10">HTTP :80</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ============ NGINX ============ -->
  <rect x="310" y="168" width="280" height="50" rx="10" fill="url(#nginxGrad)" filter="url(#shadow)"/>
  <text x="450" y="190" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Nginx</text>
  <text x="450" y="207" text-anchor="middle" fill="#d1fae5" font-size="10">Reverse Proxy / Load Balancer (Round-Robin)</text>

  <!-- ============ FASTAPI x5 ============ -->
  <!-- Arrows: Nginx → FastAPIs -->
  <line x1="350" y1="218" x2="130" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="218" x2="290" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="218" x2="450" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="218" x2="610" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="550" y1="218" x2="770" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- FastAPI boxes -->
  <rect x="80" y="270" width="120" height="60" rx="8" fill="url(#fastapiGrad)" filter="url(#shadow)"/>
  <text x="140" y="295" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">FastAPI-1</text>
  <text x="140" y="318" text-anchor="middle" fill="#cffafe" font-size="9">Uvicorn ×2</text>

  <rect x="230" y="270" width="120" height="60" rx="8" fill="url(#fastapiGrad)" filter="url(#shadow)"/>
  <text x="290" y="295" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">FastAPI-2</text>
  <text x="290" y="318" text-anchor="middle" fill="#cffafe" font-size="9">Uvicorn ×2</text>

  <rect x="390" y="270" width="120" height="60" rx="8" fill="url(#fastapiGrad)" filter="url(#shadow)"/>
  <text x="450" y="295" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">FastAPI-3</text>
  <text x="450" y="318" text-anchor="middle" fill="#cffafe" font-size="9">Uvicorn ×2</text>

  <rect x="550" y="270" width="120" height="60" rx="8" fill="url(#fastapiGrad)" filter="url(#shadow)"/>
  <text x="610" y="295" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">FastAPI-4</text>
  <text x="610" y="318" text-anchor="middle" fill="#cffafe" font-size="9">Uvicorn ×2</text>

  <rect x="710" y="270" width="120" height="60" rx="8" fill="url(#fastapiGrad)" filter="url(#shadow)"/>
  <text x="770" y="295" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">FastAPI-5</text>
  <text x="770" y="318" text-anchor="middle" fill="#cffafe" font-size="9">Uvicorn ×2</text>

  <!-- ============ C++ MODULE (attached to FastAPI) ============ -->
  <rect x="355" y="348" width="190" height="36" rx="8" fill="url(#cppGrad)" filter="url(#shadow)"/>
  <text x="450" y="371" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">C++ Module (Pybind11)</text>
  <text x="450" y="340" text-anchor="middle" fill="#c4b5fd" font-size="9">직렬화 / 필터링 / 통계 계산</text>

  <!-- Arrows: FastAPIs → Data layer -->
  <!-- PostgreSQL arrows -->
  <line x1="140" y1="330" x2="280" y2="440" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>
  <line x1="290" y1="330" x2="300" y2="440" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="384" x2="350" y2="440" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>
  <line x1="610" y1="330" x2="380" y2="440" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>
  <line x1="770" y1="330" x2="400" y2="440" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>

  <!-- Redis arrows -->
  <line x1="140" y1="330" x2="560" y2="440" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>
  <line x1="290" y1="330" x2="580" y2="440" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="384" x2="610" y2="440" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>
  <line x1="610" y1="330" x2="630" y2="440" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>
  <line x1="770" y1="330" x2="660" y2="440" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead)"/>

  <!-- ============ POSTGRESQL ============ -->
  <rect x="200" y="440" width="260" height="60" rx="10" fill="url(#pgGrad)" filter="url(#shadow)"/>
  <text x="330" y="466" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">PostgreSQL</text>
  <text x="330" y="488" text-anchor="middle" fill="#bfdbfe" font-size="10">Port 5432 · Persistent Storage</text>

  <!-- ============ REDIS ============ -->
  <rect x="500" y="440" width="260" height="60" rx="10" fill="url(#redisGrad)" filter="url(#shadow)"/>
  <text x="630" y="466" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Redis</text>
  <text x="630" y="488" text-anchor="middle" fill="#fecaca" font-size="10">Port 6379 · Cache Layer</text>

  <!-- ============ DETAILS ============ -->
  <!-- Data flow labels -->
  <rect x="80" y="530" width="180" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="170" y="550" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">센서 데이터 타입</text>
  <text x="170" y="568" text-anchor="middle" fill="#64748b" font-size="9">IMU · GPS · LiDAR</text>

  <rect x="280" y="530" width="180" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="370" y="550" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">캐시 전략</text>
  <text x="370" y="568" text-anchor="middle" fill="#64748b" font-size="9">캐시 워밍업 · TTL · 무효화</text>

  <rect x="480" y="530" width="180" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="570" y="550" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">최적화</text>
  <text x="570" y="568" text-anchor="middle" fill="#64748b" font-size="9">Bulk Insert · 복합인덱스 · Batch</text>

  <rect x="680" y="530" width="140" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="750" y="550" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">배포</text>
  <text x="750" y="568" text-anchor="middle" fill="#64748b" font-size="9">AWS EC2</text>

  <!-- TPS badge -->
  <rect x="740" y="168" width="90" height="50" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="785" y="188" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Peak TPS</text>
  <text x="785" y="208" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="800">1,010</text>
</svg>
